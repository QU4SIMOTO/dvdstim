name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libwayland-dev
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
